<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bad Clock</title>
</head>
<body>
    <div id="clock">
        <div id="analog">
            <div id="analog-face">
                <div id="analog-toasters-back" class="toaster-layer toaster-layer--back" aria-hidden="true"></div>
                <div id="horizon-line"></div>
                <div id="hour-hand" class="hand"></div>
                <div id="minute-hand" class="hand"></div>
                <div id="second-hand" class="hand"></div>
                <div class="center-dot"></div>
            </div>
            <div id="crown"></div>
        </div>
        <div id="digital">
            <div id="digital-toasters-back" class="toaster-layer toaster-layer--back" aria-hidden="true"></div>
        </div>
        <div id="toasters-front" class="toaster-layer toaster-layer--front" aria-hidden="true"></div>
    </div>

    <div id="fullscreen-toggle">
        <span>⛶ Fullscreen</span>
    </div>

    <div id="debug-toggle">
        <input type="checkbox" id="debug-checkbox">
        <label for="debug-checkbox">Debug</label>
    </div>

    <div id="debug-info">
        <div id="time-display" style="font-size: 18px; font-weight: bold; margin-bottom: 5px;">00:00:00</div>
        <div id="orientation-info">
            Orientation: 0°<br>
            Accel: x:0 y:0 z:0<br>
            Time offset: +0m<br>
            Energy: 100%
        </div>
    </div>

    <!-- Manual orientation controls panel -->
    <div id="manual-controls">
        <div class="angle-buttons">
            <button class="control-btn control-btn--blue angle-btn" data-angle="0">0°</button>
            <button class="control-btn control-btn--blue angle-btn" data-angle="90">90°</button>
            <button class="control-btn control-btn--blue angle-btn" data-angle="180">180°</button>
            <button class="control-btn control-btn--blue angle-btn" data-angle="270">270°</button>
        </div>
        <div class="button-row">
            <button class="control-btn control-btn--green auto-btn">AUTO</button>
            <button class="control-btn control-btn--purple random-btn">RANDOM</button>
        </div>
        <div class="button-row">
            <button class="control-btn control-btn--orange shake-btn">SHAKE</button>
            <button class="control-btn control-btn--red overwind-btn">OVERWIND</button>
            <button class="control-btn control-btn--purple dst-btn">DST</button>
            <button class="control-btn control-btn--orange beans-btn">BEANS</button>
        </div>
        <label class="debug-checkbox-label">
            <input type="checkbox" id="detach-on-drag-checkbox">
            Detach hands on drag
        </label>
        <label class="debug-checkbox-label">
            <input type="checkbox" id="flying-toasters-checkbox" checked>
            Flying toasters
        </label>
        <div class="slider-row">
            <label class="slider-label">Orientation <span id="orientation-slider-value">0°</span></label>
            <input type="range" id="orientation-slider" min="-360" max="360" value="0" class="debug-slider">
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
